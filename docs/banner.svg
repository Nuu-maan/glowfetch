<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220" role="img" aria-label="glowfetch">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00aeef"/>
      <stop offset="1" stop-color="#785aff"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00aeef">
        <animate attributeName="stop-color" values="#00aeef;#785aff;#f0468c;#00aeef" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#785aff">
        <animate attributeName="stop-color" values="#785aff;#f0468c;#00aeef;#785aff" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="860" height="220" rx="18" fill="#0d0f15"/>
  <rect x="1" y="1" width="858" height="218" rx="17" fill="none" stroke="url(#sky)" stroke-opacity="0.5"/>

  <!-- pulsing four-pane flag -->
  <g transform="translate(48,58)" filter="url(#glow)">
    <rect x="0"  y="0"  width="46" height="46" rx="6" fill="url(#sky)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0s"   repeatCount="indefinite"/>
    </rect>
    <rect x="56" y="0"  width="46" height="46" rx="6" fill="url(#sky)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="0"  y="56" width="46" height="46" rx="6" fill="url(#sky)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="56" y="56" width="46" height="46" rx="6" fill="url(#sky)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- wordmark -->
  <text x="210" y="98" font-family="Consolas, 'Cascadia Code', monospace" font-size="58" font-weight="700" fill="url(#title)">glowfetch</text>
  <text x="212" y="134" font-family="Consolas, 'Cascadia Code', monospace" font-size="20" fill="#6e6e7d">live system monitor for Windows</text>

  <!-- animated equalizer -->
  <g transform="translate(210,158)">
    <g fill="#00aeef">
      <rect x="0"   y="0" width="10" height="34" rx="2"><animate attributeName="height" values="8;34;14;30;8"  dur="1.5s" begin="0.0s" repeatCount="indefinite"/><animate attributeName="y" values="34;0;28;4;34" dur="1.5s" begin="0.0s" repeatCount="indefinite"/></rect>
      <rect x="16"  y="0" width="10" height="34" rx="2"><animate attributeName="height" values="30;10;34;16;30" dur="1.5s" begin="0.15s" repeatCount="indefinite"/><animate attributeName="y" values="4;28;0;24;4" dur="1.5s" begin="0.15s" repeatCount="indefinite"/></rect>
      <rect x="32"  y="0" width="10" height="34" rx="2"><animate attributeName="height" values="14;34;8;28;14" dur="1.5s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="y" values="24;0;30;6;24" dur="1.5s" begin="0.3s" repeatCount="indefinite"/></rect>
      <rect x="48"  y="0" width="10" height="34" rx="2"><animate attributeName="height" values="34;16;30;10;34" dur="1.5s" begin="0.45s" repeatCount="indefinite"/><animate attributeName="y" values="0;22;6;26;0" dur="1.5s" begin="0.45s" repeatCount="indefinite"/></rect>
      <rect x="64"  y="0" width="10" height="34" rx="2"><animate attributeName="height" values="10;30;18;34;10" dur="1.5s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="28;6;20;0;28" dur="1.5s" begin="0.6s" repeatCount="indefinite"/></rect>
    </g>
  </g>
</svg>
